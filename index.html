<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trifor Caps – Farmácia Hélio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #fff; }

    .wrapper {
      position: relative;
      display: block;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
    }

    .banner {
      width: 100%;
      display: block;
    }

    /* Área dos 3 botões sobre a imagem */
    .btn-area {
      position: absolute;
      top: 78.2%;
      left: 0;
      width: 100%;
      height: 8%;
      display: flex;
    }

    .btn-overlay {
      flex: 1;
      height: 100%;
      cursor: pointer;
      background: transparent;
      border: none;
      text-decoration: none;
      display: block;
      /* Para depurar, descomente abaixo: */
      /* background: rgba(255,0,0,0.25); */
    }

    /* Botões visíveis abaixo (fallback mobile) */
    .btn-fallback {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 20px 16px;
      background: #f0f0f0;
      max-width: 600px;
      margin: 0 auto;
    }
    .btn-fallback a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      color: #fff;
    }
    .btn-whats  { background: #25D366; }
    .btn-maps   { background: #1a3a5c; }
    .btn-phone  { background: #0d2240; }
  </style>
</head>
<body>

<div class="wrapper">
  <img
    class="banner"
    src="https://raw.githubusercontent.com/farmaciaheliosobral-afk/farmacia-helio-trifor/main/landing-trifor.png.png"
    alt="Trifor Caps – Farmácia Hélio"
  />

  <div class="btn-area">
    <!-- WhatsApp -->
    <a
      class="btn-overlay"
      href="https://wa.me/5588992237250"
      target="_blank"
      aria-label="Falar no WhatsApp"
    ></a>

    <!-- Como Chegar -->
    <a
      class="btn-overlay"
      href="https://www.google.com/maps/search/Avenida+Dom+José+Tupinambá+da+Frota+1443+Sobral+CE"
      target="_blank"
      aria-label="Como Chegar"
    ></a>

    <!-- Ligar -->
    <a
      class="btn-overlay"
      href="tel:+558836111227"
      aria-label="Ligar para a Farmácia"
    ></a>
  </div>
</div>

<!-- Botões visíveis abaixo da imagem -->
<div class="btn-fallback">
  <a class="btn-whats" href="https://wa.me/5588992237250" target="_blank">
    💬 WhatsApp — (88) 9.9223-7250
  </a>
  <a class="btn-maps" href="https://www.google.com/maps/search/Avenida+Dom+José+Tupinambá+da+Frota+1443+Sobral+CE" target="_blank">
    📍 Como Chegar — Ver no Mapa
  </a>
  <a class="btn-phone" href="tel:+558836111227">
    📞 Ligar — (88) 3611-1227
  </a>
</div>

</body>
</html>
