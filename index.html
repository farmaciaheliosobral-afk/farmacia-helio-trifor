<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trifor Caps – Farmácia Hélio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; display: flex; justify-content: center; }

    .wrapper {
      position: relative;
      width: 100%;
      max-width: 590px;
    }

    .banner {
      width: 100%;
      display: block;
    }

    /* Área dos 3 botões sobrepostos na imagem */
    .btn-area {
      position: absolute;
      top: 65.2%;
      left: 0;
      width: 100%;
      height: 6.6%;
      display: flex;
    }

    .btn-overlay {
      flex: 1;
      height: 100%;
      display: block;
      background: transparent;
      text-decoration: none;
      cursor: pointer;
      /* DEBUG: descomente para ver os botões
      background: rgba(255,0,0,0.3);
      */
    }
  </style>
</head>
<body>

<div class="wrapper">
  <img
    class="banner"
    src="https://raw.githubusercontent.com/farmaciaheliosobral-afk/farmacia-helio-trifor/main/landing-trifor.png.png"
    alt="Trifor Caps – Farmácia Hélio"
  />

  <!-- Botão WhatsApp (1/3 esquerda) -->
  <a class="btn-overlay"
     href="https://wa.me/5588992237250"
     target="_blank"
     aria-label="WhatsApp"
  ></a>

  <!-- Botão Como Chegar (1/3 centro) -->
  <a class="btn-overlay"
     href="https://www.google.com/maps/search/Avenida+Dom+José+Tupinambá+da+Frota+1443+Sobral+CE"
     target="_blank"
     aria-label="Como Chegar"
  ></a>

  <!-- Botão Ligar (1/3 direita) -->
  <a class="btn-overlay"
     href="tel:+558836111227"
     aria-label="Ligar"
  ></a>

</div>

</body>
</html>
