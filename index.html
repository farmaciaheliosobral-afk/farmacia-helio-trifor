<!DOCTYPE html>
<html lang="pt-BR">
<head>

      max-width: 590px;

    }

<body>

<div class="wrapper">

    class="banner"
    src="https://raw.githubusercontent.com/farmaciaheliosobral-afk/farmacia-helio-trifor/main/landing-trifor.png.png"

    <a class="btn-overlay"
       href="https://wa.me/5588992237250"
       target="_blank"
       aria-label="WhatsApp"
    ></a>

    <a class="btn-overlay"
       href="https://www.google.com/maps/search/Avenida+Dom+José+Tupinambá+da+Frota+1443+Sobral+CE"

       aria-label="Como Chegar"
